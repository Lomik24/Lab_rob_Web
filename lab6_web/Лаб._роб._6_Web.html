<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="utf-8"/>
        <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
        <title>
            Лабораторна робота 6
        </title>
        <link href="styles_lab_6.css" rel="stylesheet"/>
    </head>
    <body>
        <div class="form-container">
            <h2>
                Форма реєстрації
            </h2>
            <form id="regForm">
                <div class="form-group">
                    <label for="name">
                        Ім'я:
                    </label>
                    <input id="name" required="" type="text"/>
                </div>
                <div class="form-group">
                    <label for="email">
                        Email:
                    </label>
                    <input id="email" required="" type="email"/>
                </div>
                <div class="form-group">
                    <label for="password">
                        Пароль:
                    </label>
                    <input id="password" minlength="6" required="" type="password"/>
                </div>
                <div class="form-group">
                    <label for="confirm_password">
                        Повторіть пароль:
                    </label>
                    <input id="confirm_password" required="" type="password"/>
                </div>
                <div class="form-group">
                    <label for="age">
                        Вік:
                    </label>
                    <input id="age" min="10" required="" type="number"/>
                </div>
                <div class="form-group">
                    <label>
                        Стать:
                    </label>
                    <div class="radio-group">
                        <input id="male" name="gender" type="radio" value="Чоловік"/>
                        <label for="male">
                            Чоловік
                        </label>
                        <input id="female" name="gender" type="radio" value="Жінка"/>
                        <label for="female">
                            Жінка
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="group">
                        Група студентів:
                    </label>
                    <select id="group" required="">
                        <option value="">
                            Оберіть групу
                        </option>
                        <option value="Акт-13">
                            Акт-13
                        </option>
                        <option value="Акт-22сп">
                            Акт-22сп
                        </option>
                        <option value="Акт-21">
                            Акт-21
                        </option>
                        <option value="Акт-34">
                            Акт-34
                        </option>
                    </select>
                </div>
                <button type="submit">
                    Зареєструватися
                </button>
            </form>
        </div>
        <script src="script_lab_6.js">
        </script>
    </body>
</html>
