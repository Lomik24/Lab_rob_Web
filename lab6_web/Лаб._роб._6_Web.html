<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота 6</title>
    <link rel="stylesheet" href="styles_lab_6.css">
</head>
<body>
    <div class="form-container">
        <h2>Форма реєстрації</h2>
        <form id="regForm">
            <div class="form-group">
                <label for="name">Ім'я:</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" minlength="6" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Повторіть пароль:</label>
                <input type="password" id="confirm_password" required>
            </div>
            <div class="form-group">
                <label for="age">Вік:</label>
                <input type="number" id="age" min="10" required>
            </div>
            <div class="form-group">
                <label>Стать:</label>
                <div class="radio-group">
                    <input type="radio" id="male" name="gender" value="Чоловік">
                    <label for="male">Чоловік</label>
                    <input type="radio" id="female" name="gender" value="Жінка">
                    <label for="female">Жінка</label>
                </div>
            </div>
            <div class="form-group">
                <label for="group">Група студентів:</label>
                <select id="group" required>
                    <option value="">Оберіть групу</option>
                    <option value="Акт-12">Акт-12</option>
                    <option value="Акт-22сп">Акт-22сп</option>
                    <option value="Акт-21">Акт-21</option>
                    <option value="Акт-31">Акт-31</option>
                </select>
            </div>
            <button type="submit">Зареєструватися</button>
        </form>
    </div>
    <script src="script_lab_6.js"></script>
</body>
</html>
