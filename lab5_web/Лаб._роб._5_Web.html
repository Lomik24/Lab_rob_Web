<!DOCTYPE html>
<html lang="uk">
    <head>
        <meta charset="utf-8"/>
        <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
        <title>
            Лабораторна робота 5
        </title>
        <link href="styles_lab_5.css" rel="stylesheet"/>
    </head>
    <body>
        <header>
            <h1>
                Маніпуляція DOM та обробка подій
            </h1>
        </header>
        <main>
            <section>
                <h2>
                    Зміна вмісту елемента
                </h2>
                <p id="text-to-change">
                    Цей текст буде змінено.
                </p>
                <button id="btn-change">
                    Змінити текст
                </button>
            </section>
            <section>
                <h2>
                    Обробка подій
                </h2>
                <button id="btn-hover">
                    Наведіть курсор на мене
                </button>
                <p id="hover-text">
                    Наведіть курсор на кнопку ви побачите зміну стилю.
                </p>
            </section>
            <section>
                <h2>
                    Додавання нового елемента
                </h2>
                <button id="btn-add">
                    Додати елемент
                </button>
                <div id="elements-container">
                </div>
            </section>
            <section>
                <h2>
                    Індивідуальне завдання
                </h2>
                <button id="btn-var7">
                    Натисніть 7 разів!
                </button>
            </section>
        </main>
        <footer>
            <p>
                Лабораторна робота 5. JavaScript, DOM, події.
            </p>
        </footer>
        <script src="script_lab_5.js">
        </script>
    </body>
</html>
